services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-amocrm}"
      POSTGRES_USER: "${POSTGRES_USER:-amocrm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-amocrm}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend

  migrate:
    image: "${MIGRATE_IMAGE:-amocrm-migrate:local}"
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      args:
        GO_VERSION: "${GO_VERSION:-1.25}"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://amocrm:amocrm@postgres:5432/amocrm?sslmode=disable}"
      MIGRATIONS_DIR: /migrations
      MIGRATION_TIMEOUT: "${MIGRATION_TIMEOUT:-2m}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  api:
    image: "${API_IMAGE:-amocrm-api:local}"
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        GO_VERSION: "${GO_VERSION:-1.25}"
    init: true
    environment:
      APP_ENV: "${APP_ENV:-development}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      HTTP_ADDRESS: ":8080"
      MANAGEMENT_HTTP_ADDRESS: ":8082"
      DATABASE_URL: "${DATABASE_URL:-postgres://amocrm:amocrm@postgres:5432/amocrm?sslmode=disable}"
      SHUTDOWN_TIMEOUT: "${SHUTDOWN_TIMEOUT:-15s}"
      DATABASE_TIMEOUT: "${DATABASE_TIMEOUT:-2s}"
      DB_MAX_CONNS: "${DB_MAX_CONNS:-10}"
      MAX_WEBHOOK_BODY_BYTES: "${MAX_WEBHOOK_BODY_BYTES:-2097152}"
      WEBHOOK_TIMEOUT: "${WEBHOOK_TIMEOUT:-1500ms}"
      WEBHOOK_GLOBAL_RATE_PER_SECOND: "${WEBHOOK_GLOBAL_RATE_PER_SECOND:-500}"
      WEBHOOK_GLOBAL_BURST: "${WEBHOOK_GLOBAL_BURST:-1000}"
      WEBHOOK_INSTALLATION_RATE_PER_SECOND: "${WEBHOOK_INSTALLATION_RATE_PER_SECOND:-20}"
      WEBHOOK_INSTALLATION_BURST: "${WEBHOOK_INSTALLATION_BURST:-40}"
      WEBHOOK_LIMITER_INACTIVE_TTL: "${WEBHOOK_LIMITER_INACTIVE_TTL:-1h}"
      ENCRYPTION_KEYS: "${ENCRYPTION_KEYS:-1:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}"
      ACTIVE_ENCRYPTION_KEY_VERSION: "${ACTIVE_ENCRYPTION_KEY_VERSION:-1}"
      AMOCRM_REQUEST_TIMEOUT: "${AMOCRM_REQUEST_TIMEOUT:-10s}"
      OAUTH_STATE_TTL: "${OAUTH_STATE_TTL:-15m}"
      WIDGET_JWT_LEEWAY: "${WIDGET_JWT_LEEWAY:-5s}"
      WIDGET_JWT_MAX_LIFETIME: "${WIDGET_JWT_MAX_LIFETIME:-15m}"
      BOOTSTRAP_INTEGRATION_CODE: "${BOOTSTRAP_INTEGRATION_CODE:-}"
      AMOCRM_CLIENT_ID: "${AMOCRM_CLIENT_ID:-}"
      AMOCRM_CLIENT_SECRET: "${AMOCRM_CLIENT_SECRET:-}"
      AMOCRM_REDIRECT_URI: "${AMOCRM_REDIRECT_URI:-}"
      AMOCRM_WEBHOOK_EVENTS: "${AMOCRM_WEBHOOK_EVENTS:-}"
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
      - "127.0.0.1:${API_MANAGEMENT_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8082/live"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    stop_grace_period: "${CONTAINER_STOP_GRACE_PERIOD:-20s}"
    restart: unless-stopped
    networks:
      - backend

  worker:
    image: "${WORKER_IMAGE:-amocrm-worker:local}"
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        GO_VERSION: "${GO_VERSION:-1.25}"
    init: true
    environment:
      APP_ENV: "${APP_ENV:-development}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      HTTP_ADDRESS: ":8081"
      DATABASE_URL: "${DATABASE_URL:-postgres://amocrm:amocrm@postgres:5432/amocrm?sslmode=disable}"
      SHUTDOWN_TIMEOUT: "${SHUTDOWN_TIMEOUT:-15s}"
      DATABASE_TIMEOUT: "${DATABASE_TIMEOUT:-2s}"
      DB_MAX_CONNS: "${DB_MAX_CONNS:-10}"
      WORKER_POLL_INTERVAL: "${WORKER_POLL_INTERVAL:-1s}"
      WORKER_LEASE_DURATION: "${WORKER_LEASE_DURATION:-1m}"
      WORKER_JOB_TIMEOUT: "${WORKER_JOB_TIMEOUT:-45s}"
      WORKER_BATCH_SIZE: "${WORKER_BATCH_SIZE:-10}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-4}"
      CLEANUP_INTERVAL: "${CLEANUP_INTERVAL:-15m}"
      CLEANUP_TIMEOUT: "${CLEANUP_TIMEOUT:-30s}"
      CLEANUP_SAFETY_MARGIN: "${CLEANUP_SAFETY_MARGIN:-5m}"
      CLEANUP_BATCH_SIZE: "${CLEANUP_BATCH_SIZE:-500}"
      CLEANUP_MAX_BATCHES: "${CLEANUP_MAX_BATCHES:-20}"
      WEBHOOK_INBOX_RETENTION: "${WEBHOOK_INBOX_RETENTION:-720h}"
      WEBHOOK_DELIVERY_RETENTION: "${WEBHOOK_DELIVERY_RETENTION:-720h}"
      ENCRYPTION_KEYS: "${ENCRYPTION_KEYS:-1:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}"
      ACTIVE_ENCRYPTION_KEY_VERSION: "${ACTIVE_ENCRYPTION_KEY_VERSION:-1}"
      AMOCRM_REQUEST_TIMEOUT: "${AMOCRM_REQUEST_TIMEOUT:-10s}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://localhost.invalid}"
    ports:
      - "127.0.0.1:${WORKER_HEALTH_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/live"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    stop_grace_period: "${CONTAINER_STOP_GRACE_PERIOD:-20s}"
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres-data:

networks:
  backend:
    driver: bridge
