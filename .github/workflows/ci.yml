name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  contract:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate OpenAPI contract
        uses: docker/build-push-action@v6
        with:
          context: .
          target: openapi-test
          push: false
          cache-from: type=gha,scope=openapi
          cache-to: type=gha,mode=max,scope=openapi

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.yml config --quiet

      - name: Run formatting checks, vet, and tests
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          cache-from: type=gha,scope=tests
          cache-to: type=gha,mode=max,scope=tests

  build:
    name: Build ${{ matrix.target }} image
    needs:
      - contract
      - test
      - integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - api
          - worker
          - migrate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  integration:
    name: PostgreSQL integration
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate integration Compose configuration
        run: docker compose -f docker-compose.test.yml config --quiet

      - name: Run isolated migrations and integration tests
        run: make COMPOSE="docker compose" integration-test
